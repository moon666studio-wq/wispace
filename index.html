<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiSpace - Home</title>
    <link rel="icon" href="https://wispace.my.id/Image/wispaceweb-logo-bulat-bckground-putih.png" type="image/png">

    <meta property="og:title" content="WiSpace - Tempat Nonton Konser & Dokumenter Musik">
    <meta property="og:description" content="Streaming video konser band favorit dan film dokumenter musik paling keren. Tonton sekarang di WiSpace!">
    <meta property="og:image" content="https://wispace.my.id/Image/ss-index.png">
    <meta property="og:url" content="https://wispace.my.id/">
    <meta property="og:type" content="website">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="WiSpace - Tempat Nonton Konser & Dokumenter Musik">
    <meta name="twitter:description" content="Streaming video konser band favorit dan film dokumenter musik paling keren.">
    <meta name="twitter:image" content="https://wispace.my.id/Image/ss-index.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f0f0f; color: white; }
        /* Kode buat ngilangin scrollbar jelek di HP tapi tetep bisa digeser */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* Percantik scrollbar horizontal untuk video terbaru */
        .custom-x-scrollbar::-webkit-scrollbar { height: 8px; }
        .custom-x-scrollbar::-webkit-scrollbar-track { background: #1f2937; border-radius: 10px; }
        .custom-x-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        .custom-x-scrollbar::-webkit-scrollbar-thumb:hover { background: #24A1DE; }
    </style>
</head>

<body class="font-sans min-h-screen flex flex-col pb-24">

<nav class="flex flex-wrap items-center justify-between w-full p-3 md:px-6 md:py-3 bg-black z-50 border-b border-gray-800 sticky top-0 gap-y-3">
        
        <div class="flex-1 flex justify-start items-center order-1">
            <a href="index.html" class="hover:opacity-80 transition">
                <img src="https://wispace.my.id/Image/wispaceweb-logo.png" alt="WiSpace" class="h-8 md:h-10">
            </a>
        </div>

        <div class="w-full md:w-auto md:flex-none flex justify-start md:justify-center overflow-x-auto hide-scrollbar gap-2 order-3 md:order-2 md:px-6 pb-1 md:pb-0">
            
            <button onclick="filterCategory('All Videos')" class="flex-shrink-0 px-4 py-1.5 bg-[#272727] rounded-full hover:bg-gray-700 transition border border-gray-700 text-sm font-medium text-white flex items-center gap-2">
                🏠 All Videos
            </button>
            
            <button onclick="filterCategory('Music Concert')" class="flex-shrink-0 px-4 py-1.5 bg-[#121212] rounded-full hover:bg-[#272727] transition border border-gray-700 text-sm font-medium text-gray-400 hover:text-white flex items-center gap-2">
                🎵 Music Concert
            </button>
            
            <button onclick="filterCategory('Music Film')" class="flex-shrink-0 px-4 py-1.5 bg-[#121212] rounded-full hover:bg-[#272727] transition border border-gray-700 text-sm font-medium text-gray-400 hover:text-white flex items-center gap-2">
                🎬 Music Film
            </button>
            
            <button onclick="filterCategory('Documenter')" class="flex-shrink-0 px-4 py-1.5 bg-[#121212] rounded-full hover:bg-[#272727] transition border border-gray-700 text-sm font-medium text-gray-400 hover:text-white flex items-center gap-2">
                📚 Documenter
            </button>
            
        </div>

        <div class="flex-1 flex justify-end items-center order-2 md:order-3">
            <div class="flex w-full md:w-auto md:max-w-[250px] lg:max-w-xs">
                <input id="search-input" oninput="cariVideo()" type="text" placeholder="Search Video..." class="w-full bg-[#121212] border border-gray-700 rounded-l-full px-4 py-2 focus:outline-none focus:border-[#24A1DE] text-white text-sm transition">
                <button onclick="cariVideo()" class="bg-[#222222] border border-l-0 border-gray-700 rounded-r-full px-4 py-2 hover:bg-gray-700 transition">🔍</button>
            </div>
        </div>

    </nav>

    <div class="flex flex-col flex-1 w-full">
        
        <main class="flex-1 p-4 md:p-8 w-full min-w-0 overflow-hidden mx-auto max-w-[1800px]">
        
            <div class="mb-8 mt-4">
    <h2 class="text-xl md:text-2xl font-bold text-white mb-4 border-l-4 border-[#24A1DE] pl-3">🚀 New Uploaded</h2>
    
    <div id="latest-videos-container" class="flex overflow-x-auto gap-4 pb-4 custom-x-scrollbar w-full">
    </div>
</div>

<hr class="border-gray-800 mb-8">
            <h2 id="judul-halaman" class="text-xl font-bold mb-6 border-l-4 border-[#24A1DE] pl-3">All Videos</h2>
            
            <div id="video-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6">
                </div>

            <div class="flex justify-center mt-12 w-full">
                <button id="load-more-btn" onclick="muatLebihBanyak()" class="hidden bg-[#24A1DE] hover:bg-[#1e87bb] text-white font-bold py-3 px-8 rounded-full transition-all transform hover:scale-105 shadow-lg">
                    Load More ⬇️
                </button>
            </div>
        </main>

    </div>

    <script>
        // Fungsi untuk merakit baris "Baru Di-upload"
function renderVideoTerbaru(dataVideos) {
    const containerTerbaru = document.getElementById('latest-videos-container');
    containerTerbaru.innerHTML = ''; 

    // Ambil 7 video dari PALING BAWAH, lalu dibalik (reverse) biar yang paling baru ada di ujung kiri
    const videoTerbaru = [...dataVideos].slice(-7).reverse();

    videoTerbaru.forEach(vid => {
        containerTerbaru.innerHTML += `
            <a href="watch.html?id=${vid.id}" class="group cursor-pointer flex-shrink-0 w-64 md:w-72">
                <div class="relative rounded-x3 overflow-hidden mb-4 aspect-video bg-slate-800 border border-slate-700">
                   <img src="${vid.thumbnail}" 
     onmouseenter="this.src='${vid.animated_thumbnail || vid.thumbnail}'" 
     onmouseleave="this.src='${vid.thumbnail}'" 
     class="w-full h-full object-cover group-hover:scale-105 transition duration-300">
                    <span class="absolute bottom-2 right-2 bg-black bg-opacity-80 text-white text-xs px-1.5 py-0.5 rounded">${vid.duration || ''}</span>
                    <span class="absolute top-2 left-2 bg-pink-600 text-white text-[10px] px-2 py-1 rounded font-bold uppercase tracking-wider">NEW</span>
                </div>
            
                    <div class="flex flex-col">
                        <h3 class="text-white text-sm md:text-base font-semibold line-clamp-2 group-hover:text-[#24A1DE] transition">${vid.title}</h3>
                       <p class="text-gray-400 text-xs mt-1.5 line-clamp-2 leading-snug">${vid.description || 'Tonton keseruannya hanya di WiSpace!'}</p>
                     
                    </div>
                </div>
            </a>
        `;
    });
}
        let semuaVideo = []; // Data mentah dari json
        let videoAktif = []; // Data yang lagi ditayangin (bisa hasil search/filter)
        let batasTampil = 8; // TAMPILIN 8 VIDEO AJA DI AWAL

        // Ambil Data dari JSON
     // Ambil data JSON saat halaman dimuat
fetch('data.json?v=' + new Date().getTime())
    .then(res => res.json())
    .then(data => {
        semuaVideo = data; // Simpan data asli (berurutan) ke memori utama
        
        // 1. Render Video Terbaru pakai data ASLI (Biar yang baru tetep di atas)
        renderVideoTerbaru(data);
        
        // 2. Bikin copy-an data khusus untuk diacak (Shuffle)
        let dataAcak = [...data].sort(() => 0.5 - Math.random());
        videoAktif = dataAcak; // Masukin data yang udah diacak buat grid bawah
        
        // 3. Cek apakah ada lemparan pencarian dari URL
        const urlParams = new URLSearchParams(window.location.search);
        const queryCari = urlParams.get('cari');
        
        if (queryCari) {
            document.getElementById('search-input').value = queryCari;
            cariVideo(); 
        } else {
            // Tampilkan grid bawah dengan susunan acak
            renderVideos();
        }
    })
    .catch(err => console.error("Gagal load data.json:", err));

        // Mesin Utama Penampil Video
        function renderVideos() {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = ''; 
            
            const tombolLoadMore = document.getElementById('load-more-btn');

            // Kalau video kosong (nggak ketemu)
            if(videoAktif.length === 0) {
                grid.innerHTML = '<p class="text-gray-400 text-center w-full col-span-full mt-10">No videos found. Try another keyword.</p>';
                tombolLoadMore.classList.add('hidden'); // Sembunyiin tombol
                return;
            }

            // Potong video sesuai batas (misal: cuma 0 sampai 8)
            const videoYangDitayangin = videoAktif.slice(0, batasTampil);

            videoYangDitayangin.forEach(vid => {
                grid.innerHTML += `
                    <a href="watch.html?id=${vid.id}" class="group cursor-pointer block">
                        <div class="relative rounded-xl overflow-hidden mb-3 aspect-video bg-gray-800 border border-gray-800">
                          <img src="${vid.thumbnail}" 
     onmouseenter="this.src='${vid.animated_thumbnail || vid.thumbnail}'" 
     onmouseleave="this.src='${vid.thumbnail}'" 
     class="w-full h-full object-cover group-hover:scale-105 transition duration-300">
                            <span class="absolute bottom-2 right-2 bg-black bg-opacity-80 text-white text-xs px-1.5 py-0.5 rounded">${vid.duration}</span>
                            <span class="absolute top-2 left-2 bg-blue-600 bg-opacity-90 text-white text-[10px] px-2 py-1 rounded font-bold uppercase tracking-wider">${vid.category}</span>
                        </div>
                       
                            <div class="flex flex-col">
                                
                            <h3 class="text-white text-sm md:text-base font-semibold line-clamp-2 group-hover:text-[#24A1DE] transition">${vid.title}</h3>
                            <p class="text-gray-400 text-xs mt-1.5 line-clamp-2 leading-snug">${vid.description || 'Tonton keseruannya hanya di WiSpace!'}</p>
                       
                            </div>
                        </div>
                    </a>
                `;
            });

            // Logika munculin atau sembunyiin tombol Load More
            if (batasTampil >= videoAktif.length) {
                tombolLoadMore.classList.add('hidden'); // Mentok, sembunyiin
            } else {
                tombolLoadMore.classList.remove('hidden'); // Masih ada sisa, munculin
            }
        }

        // Fungsi saat tombol "Tampilkan Lebih Banyak" diklik
        function muatLebihBanyak() {
            batasTampil += 8; // Tambah 8 video lagi ke layar
            renderVideos(); // Refresh layar
        }

        // Fungsi Klik Kategori
        function filterCategory(kategori) {
            document.getElementById('search-input').value = ''; 
            batasTampil = 8; // Reset batas ke 8 tiap ganti kategori
            
            if(kategori === 'All Videos' || kategori === 'Semua') {
                document.getElementById('judul-halaman').innerText = 'All Videos';
                videoAktif = semuaVideo;
            } else {
                document.getElementById('judul-halaman').innerText = 'Category: ' + kategori;
                videoAktif = semuaVideo.filter(vid => vid.category && vid.category.includes(kategori));
            }
            renderVideos();
        }

        // Fungsi Ketik Pencarian
        function cariVideo() {
            const kataKunci = document.getElementById('search-input').value.toLowerCase();
            batasTampil = 8; // Reset batas ke 8 tiap nyari video baru
            
            if (kataKunci === '') {
                document.getElementById('judul-halaman').innerText = 'All Videos';
                videoAktif = semuaVideo;
            } else {
                document.getElementById('judul-halaman').innerText = 'Search results for: "' + kataKunci + '"';
                videoAktif = semuaVideo.filter(vid => vid.title.toLowerCase().includes(kataKunci));
            }
            renderVideos();
        }
    </script>
</body>

</html>
