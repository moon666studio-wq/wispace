   <script>
    const urlParams = new URLSearchParams(window.location.search);
    const idVideo = urlParams.get('id');
    
    // Variabel global untuk menyimpan data JSON
    let dataSemuaVideo = []; 

    // Fungsi untuk merakit daftar video di kanan
    function renderDaftarKanan(daftarVideo) {
        const rekomenList = document.getElementById('recommendation-list');
        if (!rekomenList) return; // Jaga-jaga kalau elemennya belum siap
        
        rekomenList.innerHTML = ''; 

        if (daftarVideo.length === 0) {
            rekomenList.innerHTML = '<p class="text-gray-400 text-sm italic py-4">Video tidak ditemukan bro...</p>';
            return;
        }

        daftarVideo.forEach(vid => {
            rekomenList.innerHTML += `
                <a href="watch.html?id=${vid.id}" class="flex gap-2 group cursor-pointer mb-2">
                    <div class="relative w-40 flex-shrink-0 aspect-video bg-gray-800 rounded-lg overflow-hidden">
                        <img src="${vid.thumbnail}" class="w-full h-full object-cover group-hover:scale-105 transition duration-300">
                        <div class="absolute bottom-1 right-1 bg-black/80 text-white text-[10px] px-1 rounded">${vid.duration || ''}</div>
                    </div>
                    <div class="flex flex-col overflow-hidden py-1">
                        <h4 class="font-bold text-[14px] leading-tight mb-1 group-hover:text-[#24A1DE] transition line-clamp-2">${vid.title}</h4>
                        <p class="text-gray-400 text-[12px] truncate">${vid.channel_name || "WiSpace"}</p>
                    </div>
                </a>
            `;
        });
    }

    // Fungsi pencarian saat ngetik di kotak search
    function cariVideo() {
        const inputElemen = document.getElementById('search-input');
        if (!inputElemen) return; // Jaga-jaga kalau input search gak ada di watch.html
        
        const keyword = inputElemen.value.toLowerCase();
        const judulList = document.getElementById('list-title');

        if (keyword.trim() === '') {
            // Kalau kotak search kosong, balikin ke "Next"
            if (judulList) judulList.innerText = 'Next';
            const videoLain = dataSemuaVideo.filter(vid => vid.id != idVideo).slice(0, 15);
            renderDaftarKanan(videoLain);
        } else {
            // Kalau lagi ngetik, ganti judul jadi Result dan filter videonya
            if (judulList) judulList.innerText = `Result: "${keyword}"`;
            const hasilCari = dataSemuaVideo.filter(vid => 
                vid.title.toLowerCase().includes(keyword) || 
                (vid.channel_name && vid.channel_name.toLowerCase().includes(keyword))
            );
            renderDaftarKanan(hasilCari);
        }
    }

    // Tarik data dari JSON
    fetch('data.json?v=' + new Date().getTime())
        .then(res => res.json())
        .then(data => {
            dataSemuaVideo = data; // Simpan data ke memori

            const videoSesuai = data.find(vid => vid.id == idVideo);
            
            if(videoSesuai) {
                // Update detail video utama
                const titleEl = document.getElementById('video-title');
                if (titleEl) titleEl.innerText = videoSesuai.title;
                
                const channelEl = document.getElementById('channel-name');
                if (channelEl) channelEl.innerText = videoSesuai.channel_name || "WiSpace";
                
                const avatarEl = document.getElementById('channel-avatar');
                if(videoSesuai.channel_avatar && avatarEl) {
                    avatarEl.src = videoSesuai.channel_avatar;
                    avatarEl.classList.remove('hidden');
                }

                const descEl = document.getElementById('video-description');
                if (descEl) {
                    descEl.innerText = videoSesuai.description || "Tonton keseruannya hanya di WiSpace!";
                }

                // --- BAGIAN PLAYER (BUNNY.NET) ---
                const videoContainer = document.getElementById('video-container');
                if (videoContainer) {
                    if (videoSesuai.iframe_url || videoSesuai.videoUrl) {
                        const linkEmbed = videoSesuai.iframe_url ? videoSesuai.iframe_url : videoSesuai.videoUrl;
                        videoContainer.innerHTML = `
                            <div style="position:relative;padding-top:56.25%;">
                                <iframe 
                                    src="${linkEmbed}" 
                                    loading="lazy" 
                                    style="border:none;position:absolute;top:0;left:0;height:100%;width:100%;" 
                                    allow="accelerometer;gyroscope;autoplay;encrypted-media;picture-in-picture;" 
                                    allowfullscreen="true">
                                </iframe>
                            </div>
                        `;
                    } else {
                        videoContainer.innerHTML = '<p class="text-white text-center py-10">Link video belum tersedia.</p>';
                    }
                }

                // Tampilkan daftar "Next" di kanan awal mula halaman dibuka
                const videoLain = data.filter(vid => vid.id != idVideo).slice(0, 15); 
                renderDaftarKanan(videoLain);

            } else {
                const titleEl = document.getElementById('video-title');
                if (titleEl) titleEl.innerText = "Video tidak ditemukan di data.json";
            }
        })
        .catch(err => console.error("Error ngambil data:", err));

    // Tombol Like
    const likeBtn = document.getElementById('like-btn');
    const likeIcon = document.getElementById('like-icon');
    const likeText = document.getElementById('like-text');
    let isLiked = false;

    if (likeBtn) {
        likeBtn.addEventListener('click', () => {
            isLiked = !isLiked;
            if (isLiked) {
                likeIcon.innerText = '❤️'; 
                likeText.innerText = 'Like';
                likeBtn.classList.add('text-pink-500');
            } else {
                likeIcon.innerText = '🤍'; 
                likeText.innerText = 'Like';
                likeBtn.classList.remove('text-pink-500');
            }
        });
    }


    // Fungsi ini dipanggil pas tombol Share diklik
function bagikanVideo() {
    // 1. Ambil ID video yang lagi ditonton sekarang
    const urlParams = new URLSearchParams(window.location.search);
    const idVideo = urlParams.get('id');
    
    // 2. Rangkai link sakti versi API
    const linkSakti = `https://wispace.my.id/api/watch?id=${idVideo}`;
    
    // 3. Deteksi kalau dibuka di HP (pakai fitur Share bawaan HP)
    if (navigator.share) {
        navigator.share({
            title: 'Nonton di WiSpace',
            text: 'Cek video keren ini bro!',
            url: linkSakti
        }).catch(console.error);
    } else {
        // 4. Kalau di PC, otomatis Copy ke Clipboard
        navigator.clipboard.writeText(linkSakti).then(() => {
            alert("✅ Link berhasil di-copy! Tinggal paste di WhatsApp/Sosmed.");
        }).catch(err => {
            console.error('Gagal copy link: ', err);
        });
    }
}
function munculinToast() {
    const toast = document.getElementById("toast-copy");
    toast.style.visibility = "visible";
    toast.style.opacity = "1";
    toast.style.bottom = "40px"; // Animasi naik sedikit

    // Otomatis hilang setelah 3 detik
    setTimeout(() => {
        toast.style.opacity = "0";
        toast.style.bottom = "20px"; // Turun lagi
        setTimeout(() => { toast.style.visibility = "hidden"; }, 400); // Sembunyiin setelah animasinya kelar
    }, 3000);
}
