<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sedang Menonton - WiSpace</title>
    <link rel="icon" href="https://wispace.my.id/Image/wispaceweb-logo-bulat-bckground-putih.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Scrollbar Web Utama */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f0f0f; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* Scrollbar Khusus Sidebar (Hanya Muncul Pas Kursor Masuk) */
        #next-videos-list::-webkit-scrollbar { width: 6px; }
        #next-videos-list::-webkit-scrollbar-track { background: transparent; }
        /* Warnanya transparan kalau ga disentuh */
        #next-videos-list::-webkit-scrollbar-thumb { background: transparent; border-radius: 4px; }
        /* Warnanya muncul jadi abu-abu kalau disentuh/hover */
        #next-videos-list:hover::-webkit-scrollbar-thumb { background: #444; }
        body { background-color: #0f0f0f; color: white; }
        /* Scrollbar biar ala YouTube gelap */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f0f0f; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
       <script src="https://pl28813515.effectivegatecpm.com/ab/d7/9b/abd79b571ba0638a333dbf679a304053.js"></script>
</head>
<body>

   <nav class="bg-black border-b border-gray-800 py-3 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex items-center justify-between gap-4">
            
            <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition flex-shrink-0">
                <img src="https://wispace.my.id/Image/wispaceweb-logo.png" alt="WiSpace Logo" class="w-40">
                <span class="text-xl font-bold tracking-wider hidden sm:block text-white"></span>
            </a>

            <div class="w-48 sm:w-56 lg:w-64 relative flex-shrink-0">
                <input type="text" id="searchInput" placeholder="Search Video..." class="w-full bg-transparent border border-gray-700 text-white px-4 py-1.5 pr-10 rounded-full focus:outline-none focus:border-[#24A1DE] focus:bg-[#1a1a1a] transition-all text-sm">
                <span class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-xs">🔍</span>
            </div>

        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-3 gap-8 lg:gap-12">
        
        <div class="lg:col-span-2">
            
            <div id="video-container">
                <p class="text-gray-500">Memuat video...</p>
            </div>

            <div id="video-description" class="bg-gray-900/40 rounded-xl p-5 text-gray-300 text-sm leading-relaxed border border-gray-800 mt-6 mb-8">
                </div>
                <div id="ad-container" class="max-w-2xl mx-auto bg-gray-900 border border-gray-800 rounded-xl p-2 text-center mb-8 flex items-center justify-center min-h-[90px]">
    <span class="text-gray-500 text-xs font-medium"><script async="async" data-cfasync="false" src="https://pl28813519.effectivegatecpm.com/c7cff8ba29baa58b686117866fd1c5e3/invoke.js"></script>
<div id="container-c7cff8ba29baa58b686117866fd1c5e3"></div>
</span>
            
            </div>


            <div class="bg-gray-900/40 border border-gray-800 rounded-2xl p-6 text-center mb-8 flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="text-left">
                    <h3 class="text-lg font-bold text-white">Mau Request Video atau Tanya-tanya?</h3>
                    <p class="text-gray-400 text-sm mt-1">Gabung ke grup Telegram WiSpace buat ngobrol langsung sama admin!</p>
                </div>
                <a href="https://t.me/wispace" target="_blank" class="flex-shrink-0 flex items-center gap-2 bg-[#24A1DE] hover:bg-[#1e88ba] text-white font-bold py-2.5 px-6 rounded-full transition-all text-sm">
                    <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.91-1.27 4.85-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/></svg>
                    Join Group
                </a>
            </div>

            <div class="flex items-center gap-2 mb-6">
                <span class="text-xl">💬</span>
                <h3 class="text-lg font-bold text-white">Komentar & Reaksi</h3>
            </div>
            <div class="giscus"></div>

        </div>

        <div class="lg:col-span-1">
            <h3 id="sidebar-title" class="text-xl font-bold mb-4 text-white">Next</h3>
            
           <div id="next-videos-list" class="flex flex-col gap-3 max-h-[195vh] overflow-y-auto pr-2 pb-10">
    </div>
        </div>

    </div>

    <div id="toast-copy" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-[#24A1DE] text-white px-6 py-3 rounded-full font-bold shadow-lg transition-all duration-300 opacity-0 invisible z-50">
        ✅ Link video berhasil disalin!
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('id');

        if (!videoId) window.location.href = 'index.html';

        let dataVideoGlobal = [];

        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                dataVideoGlobal = data;
                const videoSesuai = data.find(v => v.id === videoId);
                const videoLainnya = data.filter(v => v.id !== videoId);

                if (!videoSesuai) return;

                // 1. RENDER PLAYER, JUDUL, & TOMBOL (Ala Screenshot)
                document.getElementById('video-container').innerHTML = `
                    <div class="relative w-full aspect-video overflow-hidden bg-black mb-4">
                        <iframe src="${videoSesuai.iframe_url}" class="absolute top-0 left-0 w-full h-full" frameborder="0" allowfullscreen></iframe>
                    </div>
                    
                    <h1 class="text-2xl font-bold text-white mb-4">${videoSesuai.title}</h1>
                    
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                        <div class="flex items-center gap-3">
                            <img src="${videoSesuai.channel_avatar || 'https://wispace.my.id/Image/wispaceweb-logo-bulat-bckground-putih.png'}" class="w-10 h-10 rounded-full bg-gray-800">
                            <div>
                                <h3 class="text-white font-bold text-sm leading-tight">${videoSesuai.channel_name || 'WiSpace'}</h3>
                                <p class="text-gray-400 text-xs">WiSpace</p>
                            </div>
                        </div>

                        <div class="flex items-center gap-2">
                            <button class="bg-[#1a1a1a] hover:bg-[#2a2a2a] text-white px-5 py-2 rounded-full text-sm font-medium transition flex items-center gap-2">
                                🤍 Like
                            </button>
                            <button onclick="bagikanVideo()" class="bg-[#1a1a1a] hover:bg-[#2a2a2a] text-white px-5 py-2 rounded-full text-sm font-medium transition flex items-center gap-2">
                                🔗 Share
                            </button>
                        </div>
                    </div>
                `;

             // 2. RENDER DESKRIPSI (Sekarang ada judul "Deskripsi:")
document.getElementById('video-description').innerHTML = `
    <h4 class="font-bold text-white text-base mb-2">Description:</h4>
    <p class="text-gray-300">${videoSesuai.description}</p>
`;

                // 3. RENDER SIDEBAR AWAL ("Next")
                renderSidebar(videoLainnya);

                // 4. JALANKAN GISCUS
                loadGiscus(videoId);
            });

        // FUNGSI RENDER SIDEBAR
        function renderSidebar(videos) {
            const wadah = document.getElementById('next-videos-list');
            if(videos.length === 0) {
                wadah.innerHTML = '<p class="text-gray-500 text-sm">Tidak ada video ditemukan.</p>';
                return;
            }
            
            let html = '';
            videos.forEach(video => {
                html += `
                    <a href="watch.html?id=${video.id}" class="flex gap-3 group">
                        <div class="w-32 aspect-video bg-gray-800 rounded-lg overflow-hidden flex-shrink-0 relative">
                            <img src="${video.thumbnail}" class="w-full h-full object-cover group-hover:scale-105 transition duration-300">
                            <div class="absolute bottom-1 right-1 bg-black/90 text-white text-[10px] px-1 py-0.5 rounded">${video.duration}</div>
                        </div>
                        <div class="flex flex-col">
                            <h4 class="text-white text-sm font-bold line-clamp-2 group-hover:text-[#24A1DE] transition-colors leading-snug">${video.title}</h4>
                            <p class="text-gray-400 text-xs mt-1">WiSpace</p>
                        </div>
                    </a>
                `;
            });
            wadah.innerHTML = html;
        }

        // FUNGSI LIVE SEARCH UNTUK SIDEBAR
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase();
            const judulSidebar = document.getElementById('sidebar-title');
            
            if(keyword.trim() === '') {
                judulSidebar.innerText = 'Next';
                renderSidebar(dataVideoGlobal.filter(v => v.id !== videoId));
            } else {
                judulSidebar.innerText = 'Result';
                const hasilFilter = dataVideoGlobal.filter(v => 
                    v.title.toLowerCase().includes(keyword) && v.id !== videoId
                );
                renderSidebar(hasilFilter);
            }
        });

        // FUNGSI SHARE & TOAST
        // FUNGSI SHARE & TOAST
        function bagikanVideo() {
            const linkSakti = `https://wispace.my.id/api/watch?id=${videoId}`;
            navigator.clipboard.writeText(linkSakti).then(() => {
                const toast = document.getElementById("toast-copy");
                toast.classList.remove("opacity-0", "invisible");
                toast.classList.add("opacity-100", "visible");
                setTimeout(() => {
                    toast.classList.remove("opacity-100", "visible");
                    toast.classList.add("opacity-0", "invisible");
                }, 3000);
            });
        }
        // FUNGSI GISCUS
        function loadGiscus(id) {
            const script = document.createElement('script');
            script.src = "https://giscus.app/client.js";
            script.setAttribute('data-repo', 'moon666studio-wq/wispace');
            script.setAttribute('data-repo-id', 'R_kgDORZnQQQ');
            script.setAttribute('data-category', 'General');
            script.setAttribute('data-category-id', 'KODE_DIC_LU_DI_SINI'); // <-- JANGAN LUPA GANTI KODE INI BRO
            script.setAttribute('data-mapping', 'specific');
            script.setAttribute('data-term', id);
            script.setAttribute('data-strict', '0');
            script.setAttribute('data-reactions-enabled', '1');
            script.setAttribute('data-emit-metadata', '0');
            script.setAttribute('data-input-position', 'top');
            script.setAttribute('data-theme', 'dark');
            script.setAttribute('data-lang', 'id');
            script.setAttribute('crossorigin', 'anonymous');
            script.async = true;
            document.querySelector('.giscus').appendChild(script);
        }
    </script>
</body>
</html>
